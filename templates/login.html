<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>秋招信息追踪平台 - 登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f0f2f5;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
    }
    .login-box {
      background: white;
      padding: 48px 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      width: 100%; max-width: 400px;
      text-align: center;
    }
    .login-box h1 {
      font-size: 24px; color: #1a1a2e; margin-bottom: 8px;
    }
    .login-box .subtitle {
      font-size: 14px; color: #888; margin-bottom: 32px;
    }
    .login-box input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .login-box input:focus {
      border-color: #4361ee;
      box-shadow: 0 0 0 3px rgba(67,97,238,0.1);
    }
    .login-box button {
      width: 100%;
      padding: 14px;
      background: #4361ee;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-box button:hover { background: #3a56d4; }
    .error-msg {
      color: #dc2626;
      font-size: 14px;
      margin-top: 12px;
      display: none;
    }
    .lock-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="lock-icon">&#128274;</div>
    <h1>秋招信息追踪平台</h1>
    <p class="subtitle">请输入访问密码</p>
    <input type="password" id="password" placeholder="密码" autofocus>
    <button onclick="doLogin()">进入平台</button>
    <p class="error-msg" id="error">密码错误，请重试</p>
  </div>
  <script>
    function doLogin() {
      const pwd = document.getElementById('password').value;
      fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          window.location.href = '/';
        } else {
          document.getElementById('error').style.display = 'block';
        }
      });
    }
    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
